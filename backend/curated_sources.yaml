# DES Chatbot — Curated Knowledge Sources
#
# Three tiers:
#   tier1: Auto-indexed (crawled automatically on schedule)
#   tier2: Curated (manually approved URLs, indexed on update)
#   tier3: Never indexed (explicitly blocked)
#
# To add a new source: add URL to tier2, run:
#   python indexer.py curated

tier1_auto:
  # ── Digital Earth Sweden (primary) ────────────────────────────
  - url: https://digitalearth.se
    type: wordpress
    description: DES main site — all pages and posts
    schedule: weekly

  - url: https://explorer.digitalearth.se/stac
    type: stac
    description: DES STAC catalog — all datasets
    schedule: daily

  - url: https://github.com/DigitalEarthSweden/digital-earth-sweden-community
    type: github
    description: DES community tutorials, workshops, notebooks
    schedule: weekly

  - url: https://github.com/DigitalEarthSweden/openeo-processes
    type: github
    description: DES openEO process definitions
    schedule: monthly

  # ── ImintEngine (public repo, user-facing docs only) ──────────
  - url: https://github.com/TobiasEdman/imintengine
    type: github
    description: ImintEngine — README + analyzer docstrings + config
    schedule: weekly
    include:
      - README.md
      - config/analyzers.yaml
      - imint/analyzers/*.py  # docstrings only
    exclude:
      - CLAUDE.md
      - .env*
      - imint/training/
      - tests/

tier2_curated:
  # ── ESA Sentinel Technical Documentation ──────────────────────
  - url: https://sentinel.esa.int/en/web/sentinel/technical-guides/sentinel-2-msi
    type: docs
    description: Sentinel-2 MSI Technical Guide — bands, instrument, processing
    tags: [sentinel-2, msi, bands, resolution]

  - url: https://sentinel.esa.int/web/sentinel/user-guides/sentinel-2-msi
    type: docs
    description: Sentinel-2 MSI User Guide — products, levels, resolution
    tags: [sentinel-2, user-guide, L1C, L2A]

  - url: https://sentinel.esa.int/web/sentinel/user-guides/sentinel-2-msi/resolutions/spatial
    type: docs
    description: Sentinel-2 band specifications — 10m/20m/60m resolution
    tags: [sentinel-2, bands, 10m, 20m, B02, B8A]

  - url: https://sentinel.esa.int/web/sentinel/technical-guides/sentinel-1-sar
    type: docs
    description: Sentinel-1 SAR Technical Guide
