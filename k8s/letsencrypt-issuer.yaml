apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: letsencrypt-prod
  namespace: prithvi-training-default
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: tobias.edman@ri.se
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          ingress:
            class: nginx
