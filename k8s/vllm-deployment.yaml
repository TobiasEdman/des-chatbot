# vLLM serving Mistral-7B-Instruct-v0.3 on an NVIDIA GPU node.
#
# ICE Connect EKC specifics:
#   - nodeSelector "gpu-type: nvidia-2080ti" pins the pod to nodes with
#     RTX 2080 Ti GPUs. Adjust the value if your cluster labels GPU nodes
#     differently (e.g. nvidia-a100, nvidia-t4).
#   - The NVIDIA device plugin must be installed on the cluster so that
#     the "nvidia.com/gpu" resource is schedulable.
#   - gpu-memory-utilization is set to 0.90 to leave a small buffer on
#     the 11 GB VRAM of the 2080 Ti.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-mistral
  namespace: des-chatbot
  labels:
    app: vllm
    app.kubernetes.io/part-of: des-chatbot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm
  template:
    metadata:
      labels:
        app: vllm
    spec:
      # ICE Connect: schedule on GPU-equipped nodes only.
      nodeSelector:
        gpu-type: nvidia-2080ti
      containers:
        - name: vllm
          image: vllm/vllm-openai:latest
          args:
            - "--model"
            - "mistralai/Mistral-7B-Instruct-v0.3"
            - "--max-model-len"
            - "8192"
            - "--gpu-memory-utilization"
            - "0.90"
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: HUGGING_FACE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: des-chatbot-secrets
                  key: HUGGING_FACE_HUB_TOKEN
          resources:
            requests:
              cpu: "4"
              memory: "16Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "4"
              memory: "16Gi"
              nvidia.com/gpu: "1"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 120   # model loading takes time
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30       # allow up to ~5 min for large model load
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 180
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
      # Give the model time to download and load into GPU memory.
      terminationGracePeriodSeconds: 60
---
apiVersion: v1
kind: Service
metadata:
  name: vllm
  namespace: des-chatbot
  labels:
    app: vllm
    app.kubernetes.io/part-of: des-chatbot
spec:
  type: ClusterIP
  selector:
    app: vllm
  ports:
    - name: http
      port: 8000
      targetPort: http
      protocol: TCP
