# Ingress for chat.digitalearth.se -> rag-api:8080
#
# ICE Connect EKC specifics:
#   - Assumes the NGINX Ingress Controller is installed in the cluster.
#   - TLS is handled by cert-manager with a ClusterIssuer named
#     "letsencrypt-prod". Change the issuer name if your cluster uses a
#     different one (e.g. "letsencrypt-staging" for testing).
#   - Rate limiting annotations protect the API from abuse. Adjust the
#     values to match your expected traffic patterns.
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: des-chatbot-ingress
  namespace: prithvi-training-default
  labels:
    app.kubernetes.io/part-of: des-chatbot
  annotations:
    # TLS certificate management via cert-manager.
    cert-manager.io/issuer: "letsencrypt-prod"

    # NGINX Ingress Controller annotations.
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    # SSE streaming — disable proxy buffering for real-time token delivery.
    nginx.ingress.kubernetes.io/proxy-buffering: "off"

    # CORS — allow WordPress to call this API cross-origin
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://digitalearth.se,https://www.digitalearth.se"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Content-Type"

    # Rate limiting -- per client IP.
    # 10 requests/second with a burst of 20.
    nginx.ingress.kubernetes.io/limit-rps: "10"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "2"
    nginx.ingress.kubernetes.io/limit-connections: "5"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - des-chatbot.icedc.se
      secretName: des-chatbot-icedc-tls
  rules:
    - host: chat.digitalearth.se
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: rag-api
                port:
                  number: 8080
    - host: des-chatbot.icedc.se
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: rag-api
                port:
                  number: 8080
