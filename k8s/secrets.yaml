# Secrets for the DES Chatbot stack.
#
# IMPORTANT: Replace the base64 placeholder values below with your real
# tokens before applying. Generate base64 values with:
#
#   echo -n "hf_YourActualTokenHere" | base64
#
# For production, consider using a sealed-secrets controller or an
# external secrets manager (e.g. HashiCorp Vault, SOPS) instead of
# storing secrets in plain manifests.
---
apiVersion: v1
kind: Secret
metadata:
  name: des-chatbot-secrets
  namespace: prithvi-training-default
  labels:
    app.kubernetes.io/part-of: des-chatbot
type: Opaque
data:
  # Replace with your actual Hugging Face token (base64-encoded).
  # echo -n "hf_xxxxxxxxxxxxxxxxxxxx" | base64
  HUGGING_FACE_HUB_TOKEN: "REPLACE_WITH_BASE64_ENCODED_TOKEN"
